<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>My Bank</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            min-height: 100vh;
            background: #fffafa;
            color: #4a4a4a;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 25px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.08);
            padding: 40px;
        }

        h1 {
            text-align: center;
            color: #ff4d6d;
            margin-bottom: 30px;
            font-size: 2.5em;
            font-family: 'Playfair Display', serif;
            font-weight: 600;
        }

        .balance-section {
            background: linear-gradient(135deg, #ff9a9e, #fad0c4);
            color: white;
            padding: 30px;
            border-radius: 20px;
            margin-bottom: 35px;
            text-align: center;
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.08);
        }

        .balance-label {
            font-size: 13px;
            opacity: 0.95;
            margin-bottom: 12px;
            font-weight: 400;
            letter-spacing: 0.5px;
        }

        .balance-amount {
            font-size: 2.8em;
            font-weight: 600;
            font-family: 'Playfair Display', serif;
        }

        .form-section {
            margin-bottom: 35px;
            padding: 25px;
            background: #fff5f7;
            border-radius: 20px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            margin-bottom: 10px;
            color: #4a4a4a;
            font-weight: 600;
            font-size: 0.95em;
        }

        input[type="number"],
        input[type="text"] {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #f0e0e5;
            border-radius: 15px;
            font-size: 15px;
            background: white;
            transition: all 0.3s;
            font-family: 'Poppins', sans-serif;
        }

        input[type="number"]:focus,
        input[type="text"]:focus {
            outline: none;
            border-color: #ff4d6d;
            box-shadow: 0 0 0 3px rgba(255, 77, 109, 0.1);
        }

        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        button {
            padding: 14px;
            border: none;
            border-radius: 20px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Poppins', sans-serif;
        }

        .btn-add {
            background: #ff4d6d;
            color: white;
        }

        .btn-add:hover {
            background: #e63a57;
            transform: translateY(-3px);
            box-shadow: 0 8px 15px rgba(255, 77, 109, 0.3);
        }

        .btn-subtract {
            background: #ff9a9e;
            color: white;
        }

        .btn-subtract:hover {
            background: #ff7e84;
            transform: translateY(-3px);
            box-shadow: 0 8px 15px rgba(255, 154, 158, 0.3);
        }

        .btn-clear {
            grid-column: 1 / -1;
            background: #d6d6d6;
            color: #4a4a4a;
        }

        .btn-clear:hover {
            background: #c0c0c0;
            transform: translateY(-3px);
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.1);
        }

        .transactions-section {
            margin-top: 35px;
        }

        .transactions-section h2 {
            color: #ff4d6d;
            font-size: 1.5em;
            margin-bottom: 18px;
            font-family: 'Playfair Display', serif;
            font-weight: 600;
        }

        .transaction-list {
            max-height: 400px;
            overflow-y: auto;
            border: 2px solid #f0e0e5;
            border-radius: 20px;
            padding: 0;
            background: #fff5f7;
        }

        .transaction-item {
            padding: 18px;
            border-bottom: 1px solid #ffe0e8;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .transaction-item:last-child {
            border-bottom: none;
        }

        .transaction-info {
            flex: 1;
        }

        .transaction-note {
            color: #4a4a4a;
            font-size: 15px;
            font-weight: 500;
            margin-bottom: 5px;
        }

        .transaction-amount {
            font-weight: 600;
            font-size: 1.15em;
        }

        .transaction-add {
            color: #ff4d6d;
        }

        .transaction-subtract {
            color: #ff9a9e;
        }

        .transaction-date {
            color: #999;
            font-size: 12px;
        }

        .empty-message {
            text-align: center;
            color: #bbb;
            padding: 40px 20px;
            font-size: 0.95em;
        }

        .btn-delete-transaction {
            background: #ffb3ba;
            color: white;
            padding: 6px 12px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 12px;
            margin-left: 10px;
            transition: all 0.3s;
            font-weight: 600;
        }

        .btn-delete-transaction:hover {
            background: #ff9aa2;
            transform: scale(1.05);
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #fff5f7;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: #ff4d6d;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #e63a57;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏦 My Bank</h1>

        <div class="balance-section">
            <div class="balance-label">Current Balance</div>
            <div class="balance-amount">$<span id="balance">0.00</span></div>
        </div>

        <div class="form-section">
            <div class="form-group">
                <label for="amount">Amount ($)</label>
                <input type="number" id="amount" placeholder="Enter amount" step="0.01" min="0">
            </div>

            <div class="form-group">
                <label for="note">Note (optional)</label>
                <input type="text" id="note" placeholder="Add a note...">
            </div>

            <div class="button-group">
                <button class="btn-add" onclick="addMoney()">➕ Add Money</button>
                <button class="btn-subtract" onclick="subtractMoney()">➖ Spend Money</button>
                <button class="btn-clear" onclick="clearForm()">Clear</button>
            </div>
        </div>

        <div class="transactions-section">
            <h2>Transaction History</h2>
            <div class="transaction-list" id="transactionList">
                <div class="empty-message">No transactions yet. Start by adding or spending money!</div>
            </div>
        </div>
    </div>

    <script>
        // Initialize from localStorage
        let transactions = JSON.parse(localStorage.getItem('bankTransactions')) || [];

        function updateBalance() {
            const balance = transactions.reduce((sum, t) => sum + t.amount, 0);
            document.getElementById('balance').textContent = balance.toFixed(2);
            localStorage.setItem('bankTransactions', JSON.stringify(transactions));
        }

        function addMoney() {
            const amount = parseFloat(document.getElementById('amount').value);
            const note = document.getElementById('note').value || 'Added money';

            if (!amount || amount <= 0) {
                alert('Please enter a valid amount');
                return;
            }

            transactions.unshift({
                id: Date.now(),
                type: 'add',
                amount: amount,
                note: note,
                date: new Date().toLocaleString()
            });

            updateBalance();
            renderTransactions();
            clearForm();
        }

        function subtractMoney() {
            const amount = parseFloat(document.getElementById('amount').value);
            const note = document.getElementById('note').value || 'Spent money';

            if (!amount || amount <= 0) {
                alert('Please enter a valid amount');
                return;
            }

            const currentBalance = transactions.reduce((sum, t) => sum + t.amount, 0);
            if (currentBalance < amount) {
                alert(`Insufficient balance! Current balance: $${currentBalance.toFixed(2)}`);
                return;
            }

            transactions.unshift({
                id: Date.now(),
                type: 'subtract',
                amount: -amount,
                note: note,
                date: new Date().toLocaleString()
            });

            updateBalance();
            renderTransactions();
            clearForm();
        }

        function deleteTransaction(id) {
            transactions = transactions.filter(t => t.id !== id);
            updateBalance();
            renderTransactions();
        }

        function renderTransactions() {
            const listContainer = document.getElementById('transactionList');

            if (transactions.length === 0) {
                listContainer.innerHTML = '<div class="empty-message">No transactions yet. Start by adding or spending money!</div>';
                return;
            }

            listContainer.innerHTML = transactions.map(t => `
                <div class="transaction-item">
                    <div class="transaction-info">
                        <div class="transaction-note">${t.note}</div>
                        <small style="color: #999;">${t.date}</small>
                    </div>
                    <div>
                        <span class="transaction-amount ${t.type === 'add' ? 'transaction-add' : 'transaction-subtract'}">
                            ${t.type === 'add' ? '+' : ''}$${Math.abs(t.amount).toFixed(2)}
                        </span>
                        <button class="btn-delete-transaction" onclick="deleteTransaction(${t.id})">Delete</button>
                    </div>
                </div>
            `).join('');
        }

        function clearForm() {
            document.getElementById('amount').value = '';
            document.getElementById('note').value = '';
            document.getElementById('amount').focus();
        }

        // Initial render
        updateBalance();
        renderTransactions();
    </script>
</body>
</html>
